<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escape Room Ángulos</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
}

.screen { display:none; padding: 40px; }
.active { display:block; }

.container {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    max-width: 700px;
    margin: auto;
}

input {
    padding: 10px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
}

.correct { background: #4caf50 !important; }

button {
    padding: 12px 20px;
    font-size: 18px;
    border:none;
    border-radius: 10px;
    background: #ff9800;
    color:white;
    cursor:pointer;
}

#timer { font-size: 30px; margin-bottom: 20px; }

.progress {
    height: 20px;
    background: #333;
    border-radius: 10px;
    margin-bottom: 20px;
}

.bar {
    height:100%;
    width:0%;
    background: #00e5ff;
}

/* PUERTA */
#doorAnim {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:40px;
    z-index:999;
}
</style>
</head>

<body>

<div id="doorAnim">🚪 Puerta desbloqueada 🔓</div>

<!-- INICIO -->
<div id="start" class="screen active">
    <h1>🔐 ESCAPE ROOM: ÁNGULOS</h1>
    <div class="container">
        <p>Resuelve los enigmas para abrir las 4 puertas y escapar.</p>
        <input id="name" placeholder="Nombre del grupo">
        <br><br>
        <button onclick="start()">Comenzar</button>
    </div>
</div>

<!-- JUEGO -->
<div id="game" class="screen">
    <div class="container">

        <div id="timer">50:00</div>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>

        <h2 id="door"></h2>
        <p id="question"></p>
        <div id="draw"></div>

        <input id="answer">
        <br><br>
        <button onclick="check()">Corregir</button>

        <p id="msg"></p>
    </div>
</div>

<!-- FINAL -->
<div id="end" class="screen">
    <h1>🎉 ¡ESCAPASTE!</h1>
    <div class="container">
        <div id="report"></div>
    </div>
</div>

<script>

let q=0;
let name="";
let attempts=[];

// PREGUNTAS MIXTAS
const data=[

// PUERTA 1
{q:"3,5° a grados y minutos",a:"3 30"},
{q:"Triángulo: 50° + 60° + A = 180°",a:"70"},
{q:"Ángulo inscrito 40°, arco = ?",a:"80"},
{q:"150 minutos a grados y minutos",a:"2 30"},

// PUERTA 2
{q:"2,25° a grados y minutos",a:"2 15"},
{q:"Cuadrilátero: 90° + 80° + 100° + A = 360°",a:"90"},
{q:"Ángulo central 120°, inscrito = ?",a:"60"},
{q:"275′ a grados y minutos",a:"4 35"},

// PUERTA 3
{q:"1,2° a grados y minutos",a:"1 12"},
{q:"Pentágono: suma de ángulos interiores",a:"540"},
{q:"Cuadrilátero inscrito: opuesto de 70°",a:"110"},
{q:"3° 45′ a grados decimales",a:"3.75"},

// PUERTA 4
{q:"0,75° a grados y minutos",a:"0 45"},
{q:"Hexágono regular: cada ángulo",a:"120"},
{q:"Ángulo en semicircunferencia",a:"90"},
{q:"4° 20′ a minutos",a:"260"}

];

// START
function start(){
    name=document.getElementById("name").value;
    if(name=="") return alert("Pon nombre");

    document.getElementById("start").classList.remove("active");
    document.getElementById("game").classList.add("active");

    load();
    timer();
}

// LOAD
function load(){
    let item=data[q];

    document.getElementById("question").innerText=item.q;
    document.getElementById("draw").innerHTML="";
    document.getElementById("answer").value="";
    document.getElementById("msg").innerText="";

    document.getElementById("door").innerText=
        "🚪 Puerta "+(Math.floor(q/4)+1);

    document.getElementById("bar").style.width=
        (q/data.length*100)+"%";
}

// CHECK
function check(){
    let input=document.getElementById("answer");

    if(!attempts[q]) attempts[q]=0;
    attempts[q]++;

    if(input.value.trim()==data[q].a){
        input.classList.add("correct");
        document.getElementById("msg").innerText="✔ Correcto";

        setTimeout(()=>{
            input.classList.remove("correct");
            q++;

            // ANIMACIÓN CADA 4 PREGUNTAS
            if(q%4==0){
                showDoor();
            }

            if(q>=data.length) end();
            else load();

        },800);

    } else {
        document.getElementById("msg").innerText="❌ Intenta otra vez";
    }
}

// ANIMACIÓN PUERTA
function showDoor(){
    let d=document.getElementById("doorAnim");
    d.style.display="flex";

    setTimeout(()=>{
        d.style.display="none";
    },1500);
}

// TIMER
function timer(){
    let t=3000;

    let interval=setInterval(()=>{
        let m=Math.floor(t/60);
        let s=t%60;

        document.getElementById("timer").innerText=
        m+":"+(s<10?"0":"")+s;

        t--;
        if(t<0){
            clearInterval(interval);
            end();
        }
    },1000);
}

// END + ENVÍO
function end(){
    document.getElementById("game").classList.remove("active");
    document.getElementById("end").classList.add("active");

    let txt=`Grupo: ${name}\n\n`;

    attempts.forEach((a,i)=>{
        txt+=`Pregunta ${i+1}: ${a} intentos\n`;
    });

    document.getElementById("report").innerHTML=
        txt.replace(/\n/g,"<br>");

    // ENVÍO GOOGLE FORMS
    fetch("https://docs.google.com/forms/d/e/1FAIpQLScPuVqyrK0qP_zYcTL_HIHmaZSQGu1swFXYiwVs1ccJZXZzjg/formResponse",{
        method:"POST",
        mode:"no-cors",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:
        "entry.1547892793="+encodeURIComponent(name)+
        "&entry.2059120573="+encodeURIComponent(txt)
    });
}

</script>

</body>
</html>
