<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escape Room Ángulos</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
}

.screen { display:none; padding: 40px; }
.active { display:block; }

.container {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    max-width: 900px;
    margin: auto;
}

input {
    padding: 10px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
}

.correct { background: #4caf50 !important; }

button {
    padding: 12px 20px;
    font-size: 18px;
    border:none;
    border-radius: 10px;
    background: #ff9800;
    color:white;
}

#timer { font-size: 30px; margin-bottom: 20px; }

#doors span {
    padding:10px;
    margin:5px;
    background:#555;
    border-radius:8px;
}

.open { background:#4caf50 !important; }

#content {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#left { width:50%; }
#right { width:50%; }

svg { width:230px; }

.progress {
    height: 20px;
    background: #333;
    border-radius: 10px;
    margin-bottom: 20px;
}

.bar {
    height:100%;
    width:0%;
    background: #00e5ff;
}

#doorAnim {
    position: fixed;
    top:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:40px;
}
</style>
</head>

<body>

<div id="doorAnim">🚪 Puerta desbloqueada 🔓</div>

<div id="start" class="screen active">
    <h1>🔐 ESCAPE ROOM ÁNGULOS</h1>
    <div class="container">
        <p>Resuelve todos los enigmas para escapar.</p>
        <input id="name" placeholder="Nombre del grupo">
        <br><br>
        <button onclick="start()">Comenzar</button>
    </div>
</div>

<div id="game" class="screen">
<div class="container">

<div id="timer">50:00</div>

<div id="doors">
<span id="d1">🚪1</span>
<span id="d2">🚪2</span>
<span id="d3">🚪3</span>
<span id="d4">🚪4</span>
<span id="d5">🚪5</span>
<span id="d6">🚪6</span>
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<h2 id="door"></h2>

<div id="content">
<div id="left">
<p id="question"></p>
<input id="answer">
<br><br>
<button onclick="check()">Corregir</button>
<p id="msg"></p>
</div>

<div id="right">
<div id="draw"></div>
</div>
</div>

</div>
</div>

<div id="end" class="screen">
<h1>🎉 ESCAPASTE</h1>
<div class="container">
<div id="report"></div>
</div>
</div>

<script>

let q=0;
let name="";
let attempts=[];
let timeLeft=3000;

const data=[

// (mismo contenido que ya tienes, no lo cambio para no alargar)
// 👉 puedes dejar tu array tal cual

];

// START
function start(){
name=document.getElementById("name").value;
if(name=="") return alert("Pon nombre");

document.getElementById("start").classList.remove("active");
document.getElementById("game").classList.add("active");

load();
timer();
}

// LOAD
function load(){
let item=data[q];
document.getElementById("question").innerText=item.q;
document.getElementById("draw").innerHTML=item.draw || "";
document.getElementById("answer").value="";
document.getElementById("msg").innerText="";
document.getElementById("door").innerText="🚪 Puerta "+(Math.floor(q/4)+1);
document.getElementById("bar").style.width=(q/data.length*100)+"%";
}

// CHECK
function check(){
let input=document.getElementById("answer");

if(!attempts[q]) attempts[q]=0;
attempts[q]++;

if(input.value.trim()==data[q].a){
input.classList.add("correct");
document.getElementById("msg").innerText="✔ Correcto";

setTimeout(()=>{
input.classList.remove("correct");
q++;

if(q%4==0){
let d=q/4;
document.getElementById("d"+d).classList.add("open");
document.getElementById("d"+d).innerText="🔓 "+d;
document.getElementById("doorAnim").style.display="flex";
setTimeout(()=>{document.getElementById("doorAnim").style.display="none";},1500);
}

if(q>=data.length) end();
else load();

},800);

}else{
document.getElementById("msg").innerText="❌ Intenta otra vez";
}
}

// TIMER
function timer(){
timeLeft=3000;

let i=setInterval(()=>{
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;

document.getElementById("timer").innerText =
m+":"+(s<10?"0":"")+s;

timeLeft--;

if(timeLeft<0){
clearInterval(i);
end();
}

},1000);
}

// END + ENVÍO
function end(){

document.getElementById("game").classList.remove("active");
document.getElementById("end").classList.add("active");

let tiempoUsado = 3000 - timeLeft;
let minutos = Math.floor(tiempoUsado / 60);
let segundos = tiempoUsado % 60;

let tiempoFinal = minutos + ":" + (segundos < 10 ? "0" : "") + segundos;

let txt=`Grupo: ${name}\nTiempo: ${tiempoFinal}\n\n`;

attempts.forEach((a,i)=>{
txt+=`Pregunta ${i+1}: ${a} intentos\n`;
});

document.getElementById("report").innerHTML =
txt.replace(/\n/g,"<br>");

// ENVÍO COMPLETO
fetch("https://docs.google.com/forms/d/e/1FAIpQLScPuVqyrK0qP_zYcTL_HIHmaZSQGu1swFXYiwVs1ccJZXZzjg/formResponse",{
method:"POST",
mode:"no-cors",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:
"entry.1547892793="+encodeURIComponent(name)+
"&entry.2059120573="+encodeURIComponent(txt)+
"&entry.1769342368="+encodeURIComponent(tiempoFinal)
});

}

</script>

</body>
</html>
