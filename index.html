<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escape Room Ángulos</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
}

.screen { display:none; padding: 40px; }
.active { display:block; }

.container {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    max-width: 900px;
    margin: auto;
}

input {
    padding: 10px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
}

.correct { background: #4caf50 !important; }

button {
    padding: 12px 20px;
    font-size: 18px;
    border:none;
    border-radius: 10px;
    background: #ff9800;
    color:white;
    cursor:pointer;
}

#timer { font-size: 30px; margin-bottom: 20px; }

/* PUERTAS */
#doors span {
    padding:10px;
    margin:5px;
    background:#555;
    border-radius:8px;
}

.open { background:#4caf50 !important; }

/* CONTENIDO */
#content {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#left { width:50%; }
#right { width:50%; }

svg { width:220px; }

/* PROGRESO */
.progress {
    height: 20px;
    background: #333;
    border-radius: 10px;
    margin-bottom: 20px;
}

.bar {
    height:100%;
    width:0%;
    background: #00e5ff;
}

/* ANIMACIÓN */
#doorAnim {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:40px;
    z-index:999;
}
</style>
</head>

<body>

<div id="doorAnim">🚪 Puerta desbloqueada 🔓</div>

<!-- INICIO -->
<div id="start" class="screen active">
    <h1>🔐 ESCAPE ROOM: ÁNGULOS</h1>
    <div class="container">
        <p>Resuelve los enigmas para abrir las 6 puertas y escapar.</p>
        <input id="name" placeholder="Nombre del grupo">
        <br><br>
        <button onclick="start()">Comenzar</button>
    </div>
</div>

<!-- JUEGO -->
<div id="game" class="screen">
    <div class="container">

        <div id="timer">50:00</div>

        <div id="doors">
            <span id="d1">🚪1</span>
            <span id="d2">🚪2</span>
            <span id="d3">🚪3</span>
            <span id="d4">🚪4</span>
            <span id="d5">🚪5</span>
            <span id="d6">🚪6</span>
        </div>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>

        <h2 id="door"></h2>

        <div id="content">
            <div id="left">
                <p id="question"></p>

                <input id="answer">
                <br><br>
                <button onclick="check()">Corregir</button>

                <p id="msg"></p>
            </div>

            <div id="right">
                <div id="draw"></div>
            </div>
        </div>

    </div>
</div>

<!-- FINAL -->
<div id="end" class="screen">
    <h1>🎉 ¡ESCAPASTE!</h1>
    <div class="container">
        <div id="report"></div>
    </div>
</div>

<script>

let q=0;
let name="";
let attempts=[];

const data=[

// PUERTA 1
{q:"2,5° a grados y minutos",a:"2 30"},
{
q:"Triángulo: 50° + 60° + A = 180°",a:"70",
draw:`<svg><polygon points="50,150 150,150 100,50" fill="none" stroke="white"/>
<text x="70" y="140">50°</text>
<text x="120" y="140">60°</text>
<text x="95" y="70">A</text></svg>`
},
{
q:"Ángulo inscrito 30°, arco = ?",a:"60",
draw:`<svg><circle cx="100" cy="100" r="80" fill="none" stroke="white"/>
<text x="90" y="100">30°</text></svg>`
},
{q:"120′ a grados y minutos",a:"2 0"},

// PUERTA 2
{q:"1,75° a grados y minutos",a:"1 45"},
{
q:"Cuadrilátero: 90° + 80° + 100° + A = 360°",a:"90",
draw:`<svg><polygon points="50,150 150,150 140,60 60,60"
fill="none" stroke="white"/>
<text x="60" y="140">90°</text>
<text x="120" y="140">80°</text>
<text x="120" y="70">100°</text>
<text x="60" y="70">A</text></svg>`
},
{q:"Ángulo central 100°, inscrito = ?",a:"50"},
{q:"210′ a grados y minutos",a:"3 30"},

// PUERTA 3
{q:"3° 30′ a grados decimales",a:"3.5"},
{
q:"Pentágono: suma de ángulos interiores",a:"540",
draw:`<svg><polygon points="100,20 180,80 150,160 50,160 20,80"
fill="none" stroke="white"/></svg>`
},
{q:"Ángulo inscrito 45°, arco = ?",a:"90"},
{q:"0,5° a grados y minutos",a:"0 30"},

// PUERTA 4
{q:"2,2° a grados y minutos",a:"2 12"},
{
q:"Hexágono regular: cada ángulo",a:"120",
draw:`<svg><polygon points="60,20 140,20 180,100 140,180 60,180 20,100"
fill="none" stroke="white"/></svg>`
},
{q:"Cuadrilátero inscrito: opuesto de 80°",a:"100"},
{q:"4° 15′ a minutos",a:"255"},

// PUERTA 5
{q:"0,25° a grados y minutos",a:"0 15"},
{q:"Heptágono: suma de ángulos interiores",a:"900"},
{q:"Ángulo central 140°, inscrito = ?",a:"70"},
{q:"330′ a grados y minutos",a:"5 30"},

// PUERTA 6
{q:"1,6° a grados y minutos",a:"1 36"},
{q:"Octógono regular: cada ángulo",a:"135"},
{q:"Ángulo en semicircunferencia",a:"90"},
{q:"5° 45′ a grados decimales",a:"5.75"}

];

// START
function start(){
    name=document.getElementById("name").value;
    if(name=="") return alert("Pon nombre");

    document.getElementById("start").classList.remove("active");
    document.getElementById("game").classList.add("active");

    load();
    timer();
}

// LOAD
function load(){
    let item=data[q];

    document.getElementById("question").innerText=item.q;
    document.getElementById("draw").innerHTML=item.draw || "";
    document.getElementById("answer").value="";
    document.getElementById("msg").innerText="";

    document.getElementById("door").innerText=
        "🚪 Puerta "+(Math.floor(q/4)+1);

    document.getElementById("bar").style.width=
        (q/data.length*100)+"%";
}

// CHECK
function check(){
    let input=document.getElementById("answer");

    if(!attempts[q]) attempts[q]=0;
    attempts[q]++;

    if(input.value.trim()==data[q].a){
        input.classList.add("correct");
        document.getElementById("msg").innerText="✔ Correcto";

        setTimeout(()=>{
            input.classList.remove("correct");
            q++;

            if(q % 4 == 0){
                let doorNum = q / 4;
                openDoor(doorNum);
                showDoor();
            }

            if(q>=data.length) end();
            else load();

        },800);

    } else {
        document.getElementById("msg").innerText="❌ Intenta otra vez";
    }
}

// PUERTA
function openDoor(num){
    let door=document.getElementById("d"+num);
    door.classList.add("open");
    door.innerText="🔓 "+num;
}

// ANIMACIÓN
function showDoor(){
    let d=document.getElementById("doorAnim");
    d.style.display="flex";

    setTimeout(()=>{ d.style.display="none"; },1500);
}

// TIMER
function timer(){
    let t=3000;

    let interval=setInterval(()=>{
        let m=Math.floor(t/60);
        let s=t%60;

        document.getElementById("timer").innerText=
        m+":"+(s<10?"0":"")+s;

        t--;
        if(t<0){
            clearInterval(interval);
            end();
        }
    },1000);
}

// END + GOOGLE FORMS
function end(){
    document.getElementById("game").classList.remove("active");
    document.getElementById("end").classList.add("active");

    let txt=`Grupo: ${name}\n\n`;

    attempts.forEach((a,i)=>{
        txt+=`Pregunta ${i+1}: ${a} intentos\n`;
    });

    document.getElementById("report").innerHTML=
        txt.replace(/\n/g,"<br>");

    fetch("https://docs.google.com/forms/d/e/1FAIpQLScPuVqyrK0qP_zYcTL_HIHmaZSQGu1swFXYiwVs1ccJZXZzjg/formResponse",{
        method:"POST",
        mode:"no-cors",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:
        "entry.1547892793="+encodeURIComponent(name)+
        "&entry.2059120573="+encodeURIComponent(txt)
    });
}

</script>

</body>
</html>
