<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escape Room Ángulos</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
}

.screen { display:none; padding: 40px; }
.active { display:block; }

.container {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    max-width: 900px;
    margin: auto;
}

input {
    padding: 10px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
}

.correct { background: #4caf50 !important; }

button {
    padding: 12px 20px;
    font-size: 18px;
    border:none;
    border-radius: 10px;
    background: #ff9800;
    color:white;
}

#timer { font-size: 30px; margin-bottom: 20px; }

#doors span {
    padding:10px;
    margin:5px;
    background:#555;
    border-radius:8px;
}

.open { background:#4caf50 !important; }

#content {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#left { width:50%; }
#right { width:50%; }

svg { width:230px; }

.progress {
    height: 20px;
    background: #333;
    border-radius: 10px;
    margin-bottom: 20px;
}

.bar {
    height:100%;
    width:0%;
    background: #00e5ff;
}

#doorAnim {
    position: fixed;
    top:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:40px;
}

/* VIDEO FINAL */
#videoFinal {
    margin-top:20px;
}
</style>
</head>

<body>

<div id="doorAnim">🚪 Puerta desbloqueada 🔓</div>

<!-- INICIO -->
<div id="start" class="screen active">
    <h1>🔐 ESCAPE ROOM ÁNGULOS</h1>
    <div class="container">
        <p>Resuelve todos los enigmas para escapar.</p>
        <input id="name" placeholder="Nombre del grupo">
        <br><br>
        <button onclick="start()">Comenzar</button>
    </div>
</div>

<!-- JUEGO -->
<div id="game" class="screen">
<div class="container">

<div id="timer">50:00</div>

<div id="doors">
<span id="d1">🚪1</span>
<span id="d2">🚪2</span>
<span id="d3">🚪3</span>
<span id="d4">🚪4</span>
<span id="d5">🚪5</span>
<span id="d6">🚪6</span>
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<h2 id="door"></h2>

<div id="content">
<div id="left">
<p id="question"></p>
<input id="answer">
<br><br>
<button onclick="check()">Corregir</button>
<p id="msg"></p>
</div>

<div id="right">
<div id="draw"></div>
</div>
</div>

</div>
</div>

<!-- FINAL -->
<div id="end" class="screen">
<h1>🎉 ¡MISIÓN COMPLETADA!</h1>

<div class="container">
<div id="report"></div>

<!-- VIDEO FINAL -->
<video id="videoFinal" width="500" controls autoplay muted style="display:none;">
  <source src="video/final.mp4" type="video/mp4">
</video>

</div>
</div>

<script>

let q=0;
let name="";
let attempts=[];
let timeLeft=3000;

const data=[

// PUERTA 1
{q:"2,5° a grados y minutos",a:"2 30"},
{
q:"Calcula el ángulo que falta",
a:"92",
draw:`<svg viewBox="0 0 240 220">
<polygon points="60,180 180,180 160,60 80,60" fill="none" stroke="white"/>
<text x="70" y="170">85°</text>
<text x="150" y="170">110°</text>
<text x="150" y="70">73°</text>
<text x="70" y="70">A</text>
</svg>`
},
{q:"Ángulo inscrito 30°, arco?",a:"60"},
{q:"120′ a grados y minutos",a:"2 0"},

// PUERTA 2
{q:"1,75° a grados y minutos",a:"1 45"},
{
q:"Calcula el ángulo que falta",
a:"126",
draw:`<svg viewBox="0 0 240 220">
<polygon points="120,20 200,80 160,180 80,180 40,80" fill="none" stroke="white"/>
<text x="110" y="40">108°</text>
<text x="180" y="90">95°</text>
<text x="140" y="175">127°</text>
<text x="70" y="175">84°</text>
<text x="30" y="90">A</text>
</svg>`
},
{q:"Ángulo central 100°, inscrito?",a:"50"},
{q:"210′ a grados y minutos",a:"3 30"},

// PUERTA 3
{q:"3° 30′ a grados decimales",a:"3.5"},
{
q:"Calcula el ángulo que falta",
a:"155",
draw:`<svg viewBox="0 0 240 220">
<polygon points="120,20 200,70 200,150 120,200 40,150 40,70" fill="none" stroke="white"/>
<text x="110" y="40">120°</text>
<text x="180" y="90">95°</text>
<text x="180" y="150">140°</text>
<text x="110" y="190">110°</text>
<text x="50" y="150">100°</text>
<text x="40" y="90">A</text>
</svg>`
},
{q:"Ángulo inscrito 45°, arco?",a:"90"},
{q:"0,5° a grados y minutos",a:"0 30"},

// PUERTA 4
{q:"2,2° a grados y minutos",a:"2 12"},
{
q:"Calcula el ángulo que falta",
a:"120",
draw:`<svg viewBox="0 0 240 220">
<polygon points="120,20 200,70 220,140 160,200 80,200 20,140 40,70"
fill="none" stroke="white"/>
<text x="110" y="40">130°</text>
<text x="180" y="90">120°</text>
<text x="200" y="150">145°</text>
<text x="140" y="190">135°</text>
<text x="80" y="190">140°</text>
<text x="30" y="150">110°</text>
<text x="40" y="90">A</text>
</svg>`
},
{q:"Cuadrilátero inscrito opuesto de 80°",a:"100"},
{q:"4°15′ a minutos",a:"255"},

// PUERTA 5
{q:"0,25° a grados y minutos",a:"0 15"},
{
q:"Calcula el ángulo que falta",
a:"220",
draw:`<svg viewBox="0 0 240 220">
<polygon points="120,20 180,50 210,110 180,170 120,200 60,170 30,110 60,50"
fill="none" stroke="white"/>
<text x="110" y="40">100°</text>
<text x="170" y="60">140°</text>
<text x="190" y="120">120°</text>
<text x="160" y="180">135°</text>
<text x="110" y="200">110°</text>
<text x="60" y="180">130°</text>
<text x="30" y="120">125°</text>
<text x="60" y="60">A</text>
</svg>`
},
{q:"Ángulo central 140°, inscrito?",a:"70"},
{q:"330′ a grados y minutos",a:"5 30"},

// PUERTA 6
{q:"1,6° a grados y minutos",a:"1 36"},
{
q:"Calcula el ángulo que falta",
a:"114",
draw:`<svg viewBox="0 0 240 220">
<polygon points="120,20 200,80 160,180 80,180 40,80"
fill="none" stroke="white"/>
<text x="110" y="40">102°</text>
<text x="180" y="90">118°</text>
<text x="140" y="175">96°</text>
<text x="70" y="175">110°</text>
<text x="30" y="90">A</text>
</svg>`
},
{q:"Ángulo en semicircunferencia",a:"90"},
{q:"5°45′ a grados decimales",a:"5.75"}

];

// FUNCIONES

function start(){
name=document.getElementById("name").value;
if(name=="") return alert("Pon nombre");
document.getElementById("start").classList.remove("active");
document.getElementById("game").classList.add("active");
load();
timer();
}

function load(){
let item=data[q];
document.getElementById("question").innerText=item.q;
document.getElementById("draw").innerHTML=item.draw || "";
document.getElementById("answer").value="";
document.getElementById("msg").innerText="";
document.getElementById("door").innerText="🚪 Puerta "+(Math.floor(q/4)+1);
document.getElementById("bar").style.width=(q/data.length*100)+"%";
}

function check(){
let input=document.getElementById("answer");
if(!attempts[q]) attempts[q]=0;
attempts[q]++;

if(input.value.trim()==data[q].a){
input.classList.add("correct");
document.getElementById("msg").innerText="✔ Correcto";

setTimeout(()=>{
input.classList.remove("correct");
q++;

if(q%4==0){
let d=q/4;
document.getElementById("d"+d).classList.add("open");
document.getElementById("doorAnim").style.display="flex";
setTimeout(()=>{document.getElementById("doorAnim").style.display="none";},1500);
}

if(q>=data.length) end();
else load();

},800);

}else{
document.getElementById("msg").innerText="❌ Intenta otra vez";
}
}

function timer(){
let i=setInterval(()=>{
let m=Math.floor(timeLeft/60);
let s=timeLeft%60;
document.getElementById("timer").innerText=m+":"+(s<10?"0":"")+s;
timeLeft--;
if(timeLeft<0){clearInterval(i); end();}
},1000);
}

function end(){
document.getElementById("game").classList.remove("active");
document.getElementById("end").classList.add("active");

let tiempoUsado=3000-timeLeft;
let m=Math.floor(tiempoUsado/60);
let s=tiempoUsado%60;
let tiempoFinal=m+":"+(s<10?"0":"")+s;

let txt=`Grupo: ${name}\nTiempo: ${tiempoFinal}\n\n`;
attempts.forEach((a,i)=>{txt+=`Pregunta ${i+1}: ${a} intentos\n`;});

document.getElementById("report").innerHTML=txt.replace(/\n/g,"<br>");

let video=document.getElementById("videoFinal");
video.style.display="block";
video.play();

// ENVÍO GOOGLE FORMS
fetch("https://docs.google.com/forms/d/e/1FAIpQLScPuVqyrK0qP_zYcTL_HIHmaZSQGu1swFXYiwVs1ccJZXZzjg/formResponse",{
method:"POST",
mode:"no-cors",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:
"entry.1547892793="+encodeURIComponent(name)+
"&entry.2059120573="+encodeURIComponent(txt)+
"&entry.1769342368="+encodeURIComponent(tiempoFinal)
});
}

</script>

</body>
</html>
